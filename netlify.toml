# Hey AI Hub - Deployed on Netlify
[build]
  command = "npx prisma generate && node seed_db3.js && npm run build"
  publish = ".next"

[build.environment]
  NEXT_RUNTIME = "standalone"
  NODE_VERSION = "20"
  SECRETS_SCAN_ENABLED = "false"

# Next.js API routes and admin pages must NOT be redirected to index.html
[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200

# SPA fallback for client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Middleware fallback — Netlify rewrites middleware-based routes via _redirects
[[redirects]]
  from = "/login"
  to = "/login"
  status = 200
