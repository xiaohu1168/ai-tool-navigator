# Hey AI Hub - Deployed on Netlify
[build]
  command = "npx prisma generate && node seed_db3.js && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  SECRETS_SCAN_ENABLED = "false"

# Next.js API routes and admin pages must NOT be redirected to index.html
[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200
  force = true

# Do not redirect sitemap and RSS feed to index.html
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/feed.xml"
  to = "/feed.xml"
  status = 200

# SPA fallback for client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
